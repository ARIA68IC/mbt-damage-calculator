<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WARNO MBT Damage Calculator</title><style>html,body{margin:0;height:100%;background:#12151a;color:#f2f5f7;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.boot{min-height:100%;display:grid;place-items:center;text-align:center}.boot div{max-width:42rem;padding:24px}.boot h1{font-size:22px;margin:0 0 10px}.boot p{color:#aeb8c2;margin:0}</style></head><body><div class="boot"><div><h1>WARNO MBT Damage Calculator</h1><p>Loading bundled data...</p></div></div><script>
const PARTS=["assets/app.0.txt","assets/app.1.txt","assets/app.2.txt","assets/app.3.txt","assets/app.4.txt","assets/app.5.txt","assets/app.6.txt"];
(async()=>{try{const DATA=(await Promise.all(PARTS.map(p=>fetch(p).then(r=>{if(!r.ok)throw new Error(p+' '+r.status);return r.text()})))).join('');const bin=Uint8Array.from(atob(DATA),c=>c.charCodeAt(0));const stream=new Response(bin).body.pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close();}catch(err){document.body.innerHTML='<pre style="white-space:pre-wrap;padding:24px;color:#f2f5f7;background:#12151a">Failed to load bundled calculator.\n\n'+String(err).replace(/[<&]/g,s=>s==='<'?'&lt;':'&amp;')+'</pre>';}})();
</script></body></html>
